name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Compile source
        run: python -m compileall src

      - name: CLI help
        run: python scripts/remotecc.py --help

      - name: Machine-readable model guidance
        run: python scripts/remotecc.py models --json

      - name: Module entrypoint
        run: python -m remotecc --help
